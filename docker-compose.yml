version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kbon-postgres
    ports:
      - "5434:5432" # ใช้พอร์ต 5434 ข้างนอก เพื่อป้องกันการชนกับโปรแกรมอื่นในเครื่อง
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kbon_db
    volumes:
      - kbon-pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kbon-redis
    ports:
      - "6380:6379" # ใช้พอร์ต 6380 ข้างนอก
    volumes:
      - kbon-redis-data:/data
    restart: unless-stopped

volumes:
  kbon-pg-data:
  kbon-redis-data: